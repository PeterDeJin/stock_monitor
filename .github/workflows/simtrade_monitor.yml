name: 台股試撮監控

on:
  schedule:
    # UTC 23:35 = 台灣時間 07:35
    # 設這個時間是因為 GitHub Actions 單 job 硬性上限 6 小時，
    # 07:35 開始 + 6 小時 = 13:35 剛好覆蓋整個交易日（含 13:25-13:30 收盤試撮）
    - cron: '10 23 * * 0-4'
  workflow_dispatch:    # 手動觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # GitHub 硬性上限 360 分鐘，設 350 留 10 分鐘給匯出 Excel

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install shioaji openpyxl requests pytz

      - name: Run simtrade monitor
        env:
          SHIOAJI_API_KEY:    ${{ secrets.SHIOAJI_API_KEY }}
          SHIOAJI_SECRET_KEY: ${{ secrets.SHIOAJI_SECRET_KEY }}
          SHIOAJI_SIMULATION: "false"
          BARK_KEYS:          ${{ secrets.BARK_KEYS }}
          PYTHONUNBUFFERED:   "1"
        run: python -u simtrade_monitor.py

      - name: Upload Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 試撮紀錄-${{ github.run_id }}
          path: 試撮紀錄_*.xlsx
          retention-days: 7

      - name: Commit Excel to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 試撮紀錄_*.xlsx || true
          git diff --staged --quiet || git commit -m "📊 試撮紀錄 $(date +%Y%m%d)"
          git push || true
