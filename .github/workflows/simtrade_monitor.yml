name: 台股試撮監控

on:
  schedule:
    # UTC 00:25 = 台灣時間 08:25，週一到週五自動啟動
    - cron: '25 0 * * 1-5'
  workflow_dispatch:  # 也可以在 GitHub 網頁手動觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 480   # 最長跑 8 小時（6:00 啟動 → 13:35 收盤，含延遲緩衝）

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install shioaji openpyxl requests pytz

      - name: Run simtrade monitor
        env:
          SHIOAJI_API_KEY:    ${{ secrets.SHIOAJI_API_KEY }}
          SHIOAJI_SECRET_KEY: ${{ secrets.SHIOAJI_SECRET_KEY }}
          SHIOAJI_SIMULATION: "false"
          BARK_KEYS:          ${{ secrets.BARK_KEYS }}
        run: python simtrade_monitor.py

      # 把 Excel 上傳為 Artifact（保留 7 天，可在 GitHub Actions 頁面下載）
      - name: Upload Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 試撮紀錄-${{ github.run_id }}
          path: 試撮紀錄_*.xlsx
          retention-days: 7

      # 同時把 Excel commit 回 repo（這樣手機也能看到）
      - name: Commit Excel to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 試撮紀錄_*.xlsx || true
          git diff --staged --quiet || git commit -m "📊 試撮紀錄 $(date +%Y%m%d)"
          git push || true
