name: 台股試撮監控

on:
  schedule:
    # ─────────────────────────────────────────────────────────────
    # 觸發時間：台灣時間 週一~週五 07:10（提早觸發排隊，緩衝排程延遲）
    #
    # Cron 表達式：'10 23 * * 0-4'
    #   ┬─ ┬─ ┬ ┬ ┬───
    #   │  │  │ │ └── 星期（UTC）：0-4 = 週日~週四
    #   │  │  │ └──── 月份：每月
    #   │  │  └────── 日：每天
    #   │  └───────── 小時（UTC）：23
    #   └──────────── 分鐘：10
    #
    # 為什麼是 0-4 而不是 1-5？
    #   因為 GitHub cron 用 UTC 時間，UTC 比台灣慢 8 小時。
    #   UTC 週日 23:10 ＝ 台灣 週一 07:10
    #   UTC 週一 23:10 ＝ 台灣 週二 07:10
    #   UTC 週二 23:10 ＝ 台灣 週三 07:10
    #   UTC 週三 23:10 ＝ 台灣 週四 07:10
    #   UTC 週四 23:10 ＝ 台灣 週五 07:10
    #   →→ 對應到台灣時間，就是「週一到週五」。
    # ─────────────────────────────────────────────────────────────
    - cron: '10 23 * * 0-4'
  workflow_dispatch:    # 手動觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write   # 允許 github-actions[bot] 推回 Excel   # GitHub 硬性上限 360 分鐘，設 350 留 10 分鐘給匯出 Excel

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install shioaji openpyxl requests pytz

      - name: Run simtrade monitor
        env:
          SHIOAJI_API_KEY:    ${{ secrets.SHIOAJI_API_KEY }}
          SHIOAJI_SECRET_KEY: ${{ secrets.SHIOAJI_SECRET_KEY }}
          SHIOAJI_SIMULATION: "true"
          BARK_KEYS:          ${{ secrets.BARK_KEYS }}
          PYTHONUNBUFFERED:   "1"
        run: python -u simtrade_monitor.py

      - name: Upload Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 試撮紀錄-${{ github.run_id }}
          path: 試撮紀錄_*.xlsx
          retention-days: 7

      - name: Commit Excel to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 試撮紀錄_*.xlsx || true
          git diff --staged --quiet || git commit -m "📊 試撮紀錄 $(date +%Y%m%d)"
          git push || true
